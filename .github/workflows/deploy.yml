name: Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hos3ein3/resumetracker-api

jobs:
  # ── 1. Build & Push Image (GitHub-hosted runner) ──────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy on your Homelab Runner ──────────────────────
  deploy:
    name: Deploy to Homelab
    runs-on: self-hosted
    needs: build

    steps:
      - name: Pull latest image
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy
        run: |
          cd ~/wwwroot/resume-tracker/backend
          docker compose --env-file .env up -d --no-deps --pull always resumetracker-api

      - name: Clean up old images
        run: docker image prune -f
