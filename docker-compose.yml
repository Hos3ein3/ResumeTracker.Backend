services:

  # ── API ──────────────────────────────────────────────
  resumetracker-api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/resumetracker-api:${IMAGE_TAG:-latest}
    container_name: resumetracker-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__MongoDB: ${MONGO_CONNECTION}
      ConnectionStrings__PostgreSQL: ${POSTGRES_CONNECTION}
      ConnectionStrings__Redis: ${REDIS_CONNECTION}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
    networks:
      - resumetracker-net
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx ─────────────────────────────────────────────

networks:
  resumetracker-net:
    name: resumetracker-net
    driver: bridge